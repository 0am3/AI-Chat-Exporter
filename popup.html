<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --neon-cyan: #0ff;
      --neon-pink: #f0f;
      --bg-color: #050510;
    }
    
    body {
      width: 280px;
      margin: 0;
      padding: 25px 20px;
      background-color: var(--bg-color);
      color: white;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Animated Holographic Scanlines */
    body::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: repeating-linear-gradient(
        transparent, 
        transparent 2px, 
        rgba(0, 255, 255, 0.05) 3px, 
        rgba(0, 255, 255, 0.05) 4px
      );
      animation: scanline 10s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(50%); }
    }

    h3 {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--neon-cyan);
      text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan);
      margin-top: 0;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* Dynamic Cyberpunk Button */
    button {
      position: relative;
      width: 100%;
      padding: 15px;
      background: transparent;
      color: var(--neon-pink);
      border: 2px solid var(--neon-pink);
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 10px rgba(255, 0, 255, 0.2), 0 0 10px rgba(255, 0, 255, 0.2);
      overflow: hidden;
      z-index: 1;
    }

    button:hover {
      background: var(--neon-pink);
      color: var(--bg-color);
      box-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink);
    }

    /* Flowing light beam over the button */
    button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
      transform: skewX(-20deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    #status {
      margin-top: 20px;
      font-size: 12px;
      color: var(--neon-cyan);
      min-height: 15px;
      text-shadow: 0 0 2px var(--neon-cyan);
      z-index: 1;
    }
    
    .error { color: #f00 !important; text-shadow: 0 0 3px #f00 !important; }
  </style>
</head>
<body>
  <h3>Neural Extractor</h3>
  <button id="exportBtn">Extract Data Stream</button>
  <div id="status">System Ready...</div>
  
  <script src="popup.js"></script>
</body>
</html>
